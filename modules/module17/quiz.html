let current = 0;
let score = 0;
let answered = [];

function renderQ(idx) {
  const q = questions[idx];
  const diffColor = { easy: '#16a34a', medium: '#d97706', hard: '#dc2626' }[q.difficulty];
  const diffLabel = { easy: 'Dễ', medium: 'Trung bình', hard: 'Khó' }[q.difficulty];

  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-question-card">
      <div class="quiz-meta">
        <span style="background:${diffColor}15;color:${diffColor};padding:2px 10px;border-radius:20px;font-size:.8rem;font-weight:600;">${diffLabel}</span>
        <span style="font-size:.8rem;color:var(--text-muted);">Lesson ${q.lesson}</span>
      </div>
      <p class="quiz-question">${q.q}</p>
      <div class="quiz-options" id="opts">
        ${q.opts.map((o, i) => `
          <button class="quiz-option" onclick="selectAnswer(${i})" id="opt${i}">
            <span class="opt-label">${String.fromCharCode(65+i)}</span>
            <span class="opt-text">${o}</span>
          </button>`).join('')}
      </div>
      <div id="feedback" style="display:none" class="quiz-feedback"></div>
      <div id="nextBtnArea" style="display:none;margin-top:var(--space-4);text-align:right;">
        <button onclick="nextQ()" class="btn btn-primary">
          ${idx < questions.length - 1 ? 'Câu tiếp theo →' : 'Xem kết quả 🏆'}
        </button>
      </div>
    </div>`;
}

function selectAnswer(chosen) {
  const q = questions[current];
  const isRight = chosen === q.correct;
  if (isRight) score++;
  answered.push({ q: current, chosen, correct: q.correct });

  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === chosen && !isRight) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'quiz-feedback ' + (isRight ? 'correct' : 'wrong');
  fb.innerHTML = `<strong>${isRight ? '✅ Chính xác!' : '❌ Chưa đúng.'}</strong><br>${q.explain}`;
  document.getElementById('nextBtnArea').style.display = 'block';
}

function nextQ() {
  current++;
  if (current >= questions.length) { showResult(); return; }
  document.getElementById('currentQ').textContent = current + 1;
  document.getElementById('progressFill').style.width = ((current + 1) / questions.length * 100) + '%';
  renderQ(current);
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  const pct = Math.round(score / questions.length * 100);
  const msg = pct >= 80 ? '🌟 Xuất sắc! Bạn nắm vững Multi-Modal Agents.' : pct >= 60 ? '👍 Tốt! Ôn lại một số phần để củng cố kiến thức.' : '📚 Cần ôn tập thêm. Đọc lại bài giảng Module 17.';
  const eCount = answered.filter(a => questions[a.q].difficulty === 'easy'   && a.chosen === a.correct).length;
  const mCount = answered.filter(a => questions[a.q].difficulty === 'medium' && a.chosen === a.correct).length;
  const hCount = answered.filter(a => questions[a.q].difficulty === 'hard'   && a.chosen === a.correct).length;

  document.getElementById('resultArea').style.display = 'block';
  document.getElementById('resultScore').innerHTML = `<div style="font-size:3rem;font-weight:900;color:${pct>=80?'#16a34a':pct>=60?'#d97706':'#dc2626'}">${score}/15</div><div style="font-size:1.1rem;color:var(--text-muted);">${pct}% chính xác</div>`;
  document.getElementById('resultMessage').textContent = msg;
  document.getElementById('resultBreakdown').innerHTML = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px;">
    <div style="text-align:center;padding:16px;background:#f0fdf4;border-radius:12px;"><div style="font-size:1.5rem;font-weight:700;color:#16a34a;">${eCount}/5</div><div style="font-size:.8rem;color:#666;">Câu dễ</div></div>
    <div style="text-align:center;padding:16px;background:#fffbeb;border-radius:12px;"><div style="font-size:1.5rem;font-weight:700;color:#d97706;">${mCount}/7</div><div style="font-size:.8rem;color:#666;">Câu trung bình</div></div>
    <div style="text-align:center;padding:16px;background:#fef2f2;border-radius:12px;"><div style="font-size:1.5rem;font-weight:700;color:#dc2626;">${hCount}/3</div><div style="font-size:.8rem;color:#666;">Câu khó</div></div>
  </div>`;
}

function restartQuiz() {
  current = 0; score = 0; answered = [];
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('currentQ').textContent = 1;
  document.getElementById('progressFill').style.width = '6.67%';
  renderQ(0);
}

renderQ(0);
</script>
</body>
