let score = 0;
let answered = 0;
const userAnswers = new Array(questions.length).fill(null);

function renderQuestions() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = questions.map((q, i) => `
    <div class="question-card" id="qcard-${i}">
      <div class="question-number">Câu ${i + 1} / ${questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((opt, j) => `
          <button class="option-btn" id="opt-${i}-${j}" onclick="selectAnswer(${i}, ${j})">
            <div class="option-key">${'ABCD'[j]}</div>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="exp-${i}"></div>
    </div>
  `).join('');
  document.getElementById('total-display').textContent = questions.length;
}

function selectAnswer(qIdx, optIdx) {
  if (userAnswers[qIdx] !== null) return; // already answered
  userAnswers[qIdx] = optIdx;
  answered++;

  const card = document.getElementById(`qcard-${qIdx}`);
  const exp  = document.getElementById(`exp-${qIdx}`);
  const q    = questions[qIdx];
  const isCorrect = optIdx === q.correct;

  // Disable all options for this question
  for (let j = 0; j < q.opts.length; j++) {
    const btn = document.getElementById(`opt-${qIdx}-${j}`);
    btn.disabled = true;
    if (j === optIdx) {
      btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
    }
    if (!isCorrect && j === q.correct) {
      btn.classList.add('reveal-correct');
    }
  }

  card.classList.add(isCorrect ? 'correct' : 'wrong');

  exp.textContent = q.explain;
  exp.classList.add('show', isCorrect ? 'correct' : 'wrong');

  if (isCorrect) score++;

  document.getElementById('score-display').textContent = score;
  document.getElementById('answered-display').textContent = answered;
  document.getElementById('quiz-progress-fill').style.width = (answered / questions.length * 100) + '%';

  if (answered === questions.length) {
    document.getElementById('submit-btn').disabled = false;
  }
}

function showResult() {
  const pct = Math.round(score / questions.length * 100);
  const panel = document.getElementById('result-panel');
  document.getElementById('result-score-num').textContent = `${score}/${questions.length}`;
  let label, msg;
  if (pct >= 90) {
    label = '🏆 Xuất sắc! Bạn đã nắm vững Module 1';
    msg   = 'Hiểu biết tốt về LLM, Agentic AI, và Harness Engineering. Sẵn sàng tiến vào Module 2: Kiến Trúc Harness!';
  } else if (pct >= 70) {
    label = '✅ Tốt! Đã hiểu các khái niệm cốt lõi';
    msg   = 'Hãy xem lại các câu sai và đọc lại phần giải thích. Sau đó làm Jupyter Notebook để củng cố kiến thức.';
  } else if (pct >= 50) {
    label = '📖 Cần ôn tập thêm';
    msg   = 'Khuyến nghị đọc lại bài giảng Module 1, đặc biệt là Bài 3 (Agent = Model + Harness) và Bài 4 (Tool Use). Sau đó thử lại quiz.';
  } else {
    label = '🔄 Nên đọc lại bài giảng trước';
    msg   = 'Đừng nản lòng! Đọc lại các bài giảng với sự chú ý đặc biệt vào các callout box và key points. Kiến thức này sẽ nền tảng cho toàn bộ chương trình.';
  }
  document.getElementById('result-label').textContent = label;
  document.getElementById('result-msg').textContent = msg;
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Save progress
  localStorage.setItem('quiz_m1_score', score);
  localStorage.setItem('quiz_m1_date', new Date().toLocaleDateString('vi-VN'));
}

function resetQuiz() {
  score = 0; answered = 0;
  userAnswers.fill(null);
  renderQuestions();
  document.getElementById('score-display').textContent = '0';
  document.getElementById('answered-display').textContent = '0';
  document.getElementById('quiz-progress-fill').style.width = '0%';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('result-panel').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('submit-btn').addEventListener('click', showResult);
renderQuestions();
</script>
</body>
</html>
